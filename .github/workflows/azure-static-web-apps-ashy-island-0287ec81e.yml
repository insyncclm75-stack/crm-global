name: Azure Static Web Apps CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build application
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
      
      - name: Verify file count
        run: |
          FILE_COUNT=$(find dist -type f | wc -l)
          echo "📦 Total files in dist: $FILE_COUNT"
          
          echo ""
          echo "📊 File breakdown:"
          echo "  JS files: $(find dist -name '*.js' | wc -l)"
          echo "  CSS files: $(find dist -name '*.css' | wc -l)"
          echo "  HTML files: $(find dist -name '*.html' | wc -l)"
          echo "  Other: $(find dist -type f ! -name '*.js' ! -name '*.css' ! -name '*.html' | wc -l)"
          
          if [ "$FILE_COUNT" -gt 200 ]; then
            echo ""
            echo "⚠️ WARNING: File count ($FILE_COUNT) is approaching Azure's 250 file limit!"
          fi
          
          if [ "$FILE_COUNT" -gt 250 ]; then
            echo ""
            echo "❌ ERROR: File count ($FILE_COUNT) exceeds Azure Static Web Apps limit of 250 files!"
            exit 1
          fi
          
          echo ""
          echo "✅ File count ($FILE_COUNT) is within Azure limits"
      
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GREEN_MUSHROOM_06142571E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "dist"
          api_location: ""
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GREEN_MUSHROOM_06142571E }}
          action: "close"
