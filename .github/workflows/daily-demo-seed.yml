name: Daily Demo Data Seed

on:
  schedule:
    # 08:00 IST = 02:30 UTC daily
    - cron: '30 2 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of data points to seed'
        required: false
        default: '10'

jobs:
  seed:
    runs-on: ubuntu-latest
    name: Seed 10 demo data points

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Supabase client
        run: npm install @supabase/supabase-js

      - name: Run seed script
        run: node scripts/seed-demo-data.mjs ${{ github.event.inputs.count || '10' }}
